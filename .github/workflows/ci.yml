name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          path: backend
      - uses: actions/checkout@v4
        with:
          repository: librestock/packages
          path: backend/packages
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - run: pnpm install --frozen-lockfile
      - name: Build shared types
        run: pnpm --filter @librestock/types barrels && pnpm --filter @librestock/types build
      - run: pnpm lint
      - run: pnpm type-check

  test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          path: backend
      - uses: actions/checkout@v4
        with:
          repository: librestock/packages
          path: backend/packages
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - run: pnpm install --frozen-lockfile
      - name: Build shared types
        run: pnpm --filter @librestock/types barrels && pnpm --filter @librestock/types build
      - run: pnpm test

  integration-test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          path: backend
      - uses: actions/checkout@v4
        with:
          repository: librestock/packages
          path: backend/packages
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - run: pnpm install --frozen-lockfile
      - name: Build shared types
        run: pnpm --filter @librestock/types barrels && pnpm --filter @librestock/types build
      - run: pnpm test:integration
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/librestock_inventory_test

  build:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          path: backend
      - uses: actions/checkout@v4
        with:
          repository: librestock/packages
          path: backend/packages
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - run: pnpm install --frozen-lockfile
      - name: Build shared types
        run: pnpm --filter @librestock/types barrels && pnpm --filter @librestock/types build
      - run: pnpm build
