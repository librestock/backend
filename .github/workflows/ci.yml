name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          path: backend

      - uses: actions/checkout@v4
        with:
          repository: librestock/packages
          path: packages

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build shared types package
        working-directory: packages
        run: |
          pnpm install --frozen-lockfile
          pnpm --dir types build

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run type-check

  test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          path: backend

      - uses: actions/checkout@v4
        with:
          repository: librestock/packages
          path: packages

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build shared types package
        working-directory: packages
        run: |
          pnpm install --frozen-lockfile
          pnpm --dir types build

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test -- --runInBand

  build:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          path: backend

      - uses: actions/checkout@v4
        with:
          repository: librestock/packages
          path: packages

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build shared types package
        working-directory: packages
        run: |
          pnpm install --frozen-lockfile
          pnpm --dir types build

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
